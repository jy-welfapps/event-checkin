<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1f35">
<title>イベント受付システム</title>
<!-- PWA manifest インライン（GAS配信対応） -->
<link rel="manifest" href="data:application/json;charset=utf-8,{
  &quot;name&quot;:&quot;イベント受付システム&quot;,
  &quot;short_name&quot;:&quot;受付&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#1a1f35&quot;,
  &quot;theme_color&quot;:&quot;#1a1f35&quot;
}">
<style>
/* ============================================================
   DESIGN: 深夜の宇宙 × 実務クリーン
   - 深い藍色ベース、星空テクスチャ
   - アクセントは惑星のような琥珀〜ゴールド
   - 児童福祉らしい温かみをゴールドで表現
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Orbitron:wght@600&display=swap');
:root {
  /* ダークテーマ（デフォルト：深夜の宇宙） */
  --bg-deep:     #0d1117;
  --bg-mid:      #1a1f35;
  --bg-card:     #1e2540;
  --bg-card2:    #252d4a;
  --accent:      #f0a500;
  --accent2:     #f7c948;
  --teal:        #3dd6c8;
  --red:         #ff5f6d;
  --green:       #2dbb6a;
  --text-main:   #e8eaf6;
  --text-sub:    #8892b0;
  --text-muted:  #4a5270;
  --border:      #2a3255;
  --shadow:      0 8px 32px rgba(0,0,0,0.5);
  --radius:      14px;
  --radius-sm:   8px;
  --header-bg:   linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
  --header-border: #2a3255;
}
/* ライトテーマ */
body.theme-light {
  --bg-deep:     #f0f4f8;
  --bg-mid:      #ffffff;
  --bg-card:     #ffffff;
  --bg-card2:    #f7f9fc;
  --accent:      #0070f3;
  --accent2:     #338ef7;
  --teal:        #0e9de2;
  --red:         #e53e3e;
  --green:       #1a9e4a;
  --text-main:   #1a202c;
  --text-sub:    #4a5568;
  --text-muted:  #a0aec0;
  --border:      #e2e8f0;
  --shadow:      0 4px 16px rgba(0,0,0,0.1);
  --header-bg:   linear-gradient(135deg, #1a56db 0%, #0e3fa5 100%);
  --header-border: #1a4dbe;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg-deep);
  color: var(--text-main);
  overflow: hidden;
}
/* 星空背景（ダークテーマのみ） */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(61,214,200,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(240,165,0,0.05) 0%, transparent 50%);
  pointer-events: none;
  transition: opacity 0.3s;
}
body.theme-light::before { opacity: 0; }
#stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 30%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 90% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(2px 2px at 5%  40%, rgba(255,255,255,0.4) 0%, transparent 100%);
  transition: opacity 0.3s;
}
body.theme-light #stars { opacity: 0; }
/* ライトテーマ時のヘッダー文字色（白に固定） */
body.theme-light .logo,
body.theme-light .status-badge.online,
body.theme-light .status-badge.offline,
body.theme-light #open-settings,
body.theme-light .queue-badge {
  color: rgba(255,255,255,0.9) !important;
  border-color: rgba(255,255,255,0.3) !important;
  background: rgba(255,255,255,0.1) !important;
}
body.theme-light .progress-item {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.25);
}
body.theme-light .progress-label,
body.theme-light .progress-num { color: rgba(255,255,255,0.9); }
body.theme-light .progress-bar-wrap { background: rgba(255,255,255,0.2); }
/* ---- レイアウト ---- */
#app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  max-width: 768px; margin: 0 auto;
}
/* ---- ヘッダー ---- */
header {
  background: var(--header-bg);
  border-bottom: 1px solid var(--header-border);
  padding: 12px 16px;
  flex-shrink: 0;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.header-title {
  display: flex; align-items: center; gap: 10px;
}
.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; letter-spacing: 2px;
  color: var(--accent); opacity: 0.85;
  white-space: nowrap;
}
.header-right {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
/* 接続ステータス */
.status-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; padding: 4px 9px;
  border-radius: 20px; font-weight: 700;
  transition: all 0.3s;
}
.status-badge.online  { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
.status-badge.offline { background: rgba(255,95,109,0.12); color: var(--red);   border: 1px solid rgba(255,95,109,0.3); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.status-badge.online .status-dot { animation: pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
/* キューバッジ */
.queue-badge {
  display: none; align-items: center; gap: 4px;
  background: rgba(240,165,0,0.15); color: var(--accent);
  border: 1px solid rgba(240,165,0,0.3);
  border-radius: 20px; padding: 4px 9px; font-size: 11px; font-weight: 700;
}
.queue-badge.visible { display: flex; }
/* 進捗カウンター */
.progress-row {
  display: flex; gap: 8px; margin-top: 10px;
}
.progress-item {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 7px 10px;
  display: flex; align-items: center; gap: 8px;
}
.progress-label { font-size: 10px; color: var(--text-sub); white-space: nowrap; }
.progress-bar-wrap { flex: 1; height: 5px; background: var(--bg-mid); border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--teal), var(--accent)); transition: width 0.6s ease; }
.progress-num { font-size: 11px; font-weight: 700; color: var(--text-main); white-space: nowrap; }
/* ---- タブ ---- */
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--bg-mid); flex-shrink: 0;
}
.tab-btn {
  flex: 1; padding: 13px 8px; font-size: 13px; font-weight: 700;
  background: none; border: none; color: var(--text-sub);
  cursor: pointer; position: relative; transition: color 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.tab-btn.active { color: var(--accent); }
.tab-btn::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px;
  background: var(--accent); border-radius: 2px 2px 0 0;
  transform: scaleX(0); transition: transform 0.25s;
}
.tab-btn.active::after { transform: scaleX(1); }
/* ---- 検索エリア ---- */
.search-area {
  background: var(--bg-mid); border-bottom: 1px solid var(--border);
  padding: 12px 14px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.search-row { display: flex; gap: 8px; }
.input-wrap {
  flex: 1; position: relative;
}
.input-wrap input, .input-wrap select {
  width: 100%; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  color: var(--text-main); font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none; appearance: none;
}
.input-wrap input:focus, .input-wrap select:focus {
  border-color: var(--accent);
}
.input-wrap input::placeholder { color: var(--text-muted); }
.select-arrow {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-sub); pointer-events: none; font-size: 11px;
}
.btn {
  padding: 10px 16px; border: none; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--accent); color: #111; }
.btn-primary:hover { background: var(--accent2); }
body.theme-light .btn-primary { color: #fff; }
body.theme-light .btn-primary:hover { background: var(--accent2); }
body.theme-light .btn-teal {
  background: var(--teal); color: #fff; border-color: var(--teal);
}
body.theme-light .btn-teal:hover { background: var(--accent2); border-color: var(--accent2); }
body.theme-light .btn-qr {
  background: var(--teal); color: #fff; border-color: var(--teal);
}
.btn-teal { background: rgba(61,214,200,0.15); color: var(--teal); border: 1px solid rgba(61,214,200,0.3); }
.btn-teal:hover { background: rgba(61,214,200,0.25); }
.btn-ghost { background: var(--bg-card2); color: var(--text-sub); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text-main); border-color: var(--text-sub); }
.btn-danger { background: rgba(255,95,109,0.15); color: var(--red); border: 1px solid rgba(255,95,109,0.3); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-xs { padding: 4px 9px; font-size: 11px; }
/* QRスキャンボタン */
.btn-qr {
  background: linear-gradient(135deg, #1e2540, #252d4a);
  color: var(--teal); border: 1px solid rgba(61,214,200,0.4);
  display: flex; align-items: center; gap: 6px;
}
/* ---- メインコンテンツ ---- */
.main-content {
  flex: 1; overflow-y: auto; padding: 12px 14px;
  -webkit-overflow-scrolling: touch;
}
/* ---- カメラビュー ---- */
#camera-view {
  display: none; flex-direction: column; gap: 12px;
  position: fixed; inset: 0; z-index: 100;
  background: #000; padding: 20px;
  align-items: center; justify-content: center;
}
#camera-view.active { display: flex; }
#qr-video {
  width: 100%; max-width: 360px; border-radius: 12px;
  border: 2px solid var(--teal);
}
.qr-overlay {
  position: relative; width: 100%; max-width: 360px;
}
.qr-frame {
  position: absolute; inset: 0;
  border: none; pointer-events: none;
}
.qr-corner {
  position: absolute; width: 28px; height: 28px;
  border-color: var(--accent); border-style: solid;
}
.qr-corner.tl { top: 8px; left: 8px;  border-width: 3px 0 0 3px; }
.qr-corner.tr { top: 8px; right: 8px; border-width: 3px 3px 0 0; }
.qr-corner.bl { bottom: 8px; left: 8px;  border-width: 0 0 3px 3px; }
.qr-corner.br { bottom: 8px; right: 8px; border-width: 0 3px 3px 0; }
/* スキャンライン */
.scan-line {
  position: absolute; left: 8px; right: 8px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: scan 2s linear infinite;
  border-radius: 1px;
}
@keyframes scan {
  0%   { top: 10%; opacity: 1; }
  90%  { top: 85%; opacity: 1; }
  100% { top: 85%; opacity: 0; }
}
.qr-hint { color: var(--text-sub); font-size: 13px; text-align: center; }
/* ---- ファミリーカード ---- */
.family-section {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.family-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  background: var(--bg-card2);
}
.family-id-badge {
  font-size: 11px; color: var(--accent); font-weight: 700;
  background: rgba(240,165,0,0.1); border: 1px solid rgba(240,165,0,0.25);
  border-radius: 4px; padding: 2px 7px; font-family: 'Orbitron', sans-serif;
}
.family-seat {
  font-size: 12px; font-weight: 900; color: var(--accent);
  background: rgba(240,165,0,0.12); border: 1px solid rgba(240,165,0,0.3);
  border-radius: 4px; padding: 2px 8px; margin-left: 8px;
}
.family-tel {
  font-size: 12px; color: var(--teal); text-decoration: none;
  opacity: 0.85; margin-left: 8px;
}
.family-tel:hover { opacity: 1; text-decoration: underline; }
.family-checkin-all {
  display: flex; gap: 6px;
}
/* ---- 個人行 ---- */
.person-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid rgba(42,50,85,0.5);
  transition: background 0.15s;
}
.person-row:last-child { border-bottom: none; }
.person-row:hover { background: rgba(255,255,255,0.02); }
.person-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; font-weight: 700;
}
.avatar-child    { background: rgba(61,214,200,0.15); color: var(--teal); }
.avatar-parent   { background: rgba(240,165,0,0.15);  color: var(--accent); }
.avatar-sibling  { background: rgba(139,92,246,0.15); color: #a78bfa; }
.person-info { flex: 1; min-width: 0; }
.person-name { font-size: 14px; font-weight: 700; }
.person-meta { font-size: 11px; color: var(--text-sub); margin-top: 1px; }
.person-actions { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
/* チェックインボタン */
.checkin-btn {
  padding: 6px 11px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid;
  font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
}
.checkin-btn.not-target {
  background: transparent; color: var(--text-muted); border-color: var(--text-muted);
  cursor: not-allowed; opacity: 0.4;
}
.checkin-btn.undone {
  background: rgba(255,95,109,0.12); color: var(--red); border-color: rgba(255,95,109,0.35);
  font-weight: 900;
}
.checkin-btn.undone:hover { background: rgba(255,95,109,0.22); }
.checkin-btn.done {
  background: rgba(74,222,128,0.1); color: var(--green); border-color: rgba(74,222,128,0.3);
}
/* 体温入力 */
.temp-input {
  width: 72px; background: var(--bg-mid); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 5px 4px; color: var(--text-main);
  font-size: 12px; text-align: center; outline: none;
  font-family: 'Noto Sans JP', sans-serif;
  -webkit-appearance: none; appearance: none; cursor: pointer;
}
.temp-input:focus { border-color: var(--accent); }
.temp-input.temp-required {
  border-color: var(--red) !important;
  background: rgba(255,95,109,0.08);
  animation: tempPulse 2s ease-in-out infinite;
}
@keyframes tempPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,95,109,0); }
  50%      { box-shadow: 0 0 0 3px rgba(255,95,109,0.3); }
}
/* ---- 新規追加フォーム ---- */
.add-form {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 16px;
  animation: slideUp 0.3s ease;
}
.add-form h3 {
  font-size: 13px; color: var(--accent); margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.form-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px;
}
.form-grid .full { grid-column: 1 / -1; }
.form-label { font-size: 11px; color: var(--text-sub); margin-bottom: 3px; }
.form-input {
  width: 100%; background: var(--bg-mid); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text-main);
  font-size: 13px; outline: none; font-family: 'Noto Sans JP', sans-serif;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--accent); }
.checkbox-row { display: flex; gap: 12px; margin-top: 4px; }
.checkbox-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; cursor: pointer; color: var(--text-main);
}
.checkbox-label input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }
/* ---- 設定パネル ---- */
.settings-panel {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(13,17,23,0.9); align-items: flex-end;
}
.settings-panel.active { display: flex; }
.settings-inner {
  width: 100%; max-width: 768px; margin: 0 auto;
  background: var(--bg-card); border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px; border: 1px solid var(--border); border-bottom: none;
}
.settings-inner h2 { font-size: 15px; margin-bottom: 16px; color: var(--accent); }
.settings-row {
  margin-bottom: 14px;
}
.settings-row label { font-size: 12px; color: var(--text-sub); display: block; margin-bottom: 5px; }
/* ---- ローディング ---- */
.spinner {
  display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* ---- トースト通知 ---- */
#toast-area {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center;
  pointer-events: none;
}
.toast {
  padding: 10px 18px; border-radius: 24px; font-size: 13px; font-weight: 700;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  pointer-events: none; white-space: nowrap;
}
.toast.success { background: rgba(74,222,128,0.9); color: #0a0a0a; }
.toast.error   { background: rgba(255,95,109,0.9); color: #fff; }
.toast.info    { background: rgba(240,165,0,0.9); color: #111; }
@keyframes toastIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; } }
/* ---- 空状態 ---- */
.empty-state {
  text-align: center; padding: 48px 20px; color: var(--text-muted);
}
.empty-icon { font-size: 42px; margin-bottom: 12px; opacity: 0.4; }
.empty-text { font-size: 14px; }
/* ---- モーダル（確認） ---- */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px; max-width: 320px; width: 90%;
  animation: slideUp 0.25s ease;
}
.modal-box h3 { font-size: 15px; margin-bottom: 10px; }
.modal-box p  { font-size: 13px; color: var(--text-sub); margin-bottom: 18px; line-height: 1.6; }
.modal-actions { display: flex; gap: 8px; }
.modal-actions .btn { flex: 1; }
/* ---- 最終同期表示 ---- */
.last-sync {
  font-size: 10px; color: var(--text-muted); text-align: right;
  margin-top: 6px; transition: color 0.3s;
}
body.theme-light .last-sync { color: rgba(255,255,255,0.6); }
/* ---- 検索クリアボタン ---- */
.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 32px 10px 12px;
  color: var(--text-main); font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none; appearance: none;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-clear {

<!-- jsQR: BarcodeDetector非対応環境（PC等）のフォールバック用 -->
<!-- オフライン時はBarcodeDetectorを使うためjsQRは不要 -->
<script>
(function() {
  if ('BarcodeDetector' in window) return; // BarcodeDetector対応なら不要
  if (!navigator.onLine) return;           // オフライン時はロードしない
  const cdns = [
    'https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js',
    'https://unpkg.com/jsqr@1.4.0/dist/jsQR.js',
    'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js'
  ];
  let idx = 0;
  function tryNext() {
    if (idx >= cdns.length) return;
    const s = document.createElement('script');
    s.src = cdns[idx++];
    s.onerror = tryNext;
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>
<script>
// ============================================================
//  イベント受付システム - フロントエンド (v3.2 機能追加版)
// ============================================================
const DB_NAME            = 'EventCheckin';
const DB_VERSION         = 1;
const STORE_PARTICIPANTS = 'participants';
const STORE_QUEUE        = 'syncQueue';
const STORE_META         = 'meta';
let db           = null;
// イベントタブ廃止：一括受付に統合
let isSyncing    = false;
let qrStream     = null;
let qrInterval   = null;
let pollTimer       = null;   // 自動ポーリング用
let isUserActive    = false;  // 体温入力などの操作中フラグ
let currentFamilyId = null;   // QRスキャンで絞り込み中の家族ID（nullなら全件表示）
const state = { gasUrl: '', apiKey: '' };
// ============================================================
//  IndexedDB ユーティリティ
// ============================================================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_PARTICIPANTS))
        d.createObjectStore(STORE_PARTICIPANTS, { keyPath: '個人ID' });
      if (!d.objectStoreNames.contains(STORE_QUEUE))
        d.createObjectStore(STORE_QUEUE, { keyPath: 'queueId', autoIncrement: true });
      if (!d.objectStoreNames.contains(STORE_META))
        d.createObjectStore(STORE_META, { keyPath: 'key' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
function idbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror   = () => reject(req.error);
  });
}
function idbPut(storeName, obj) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).put(obj);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
function idbDelete(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(key);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}
function idbClear(storeName) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).clear();
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}
async function getMeta(key) {
  const all = await idbGetAll(STORE_META);
  const rec = all.find(r => r.key === key);
  return rec ? rec.value : null;
}
async function setMeta(key, value) {
  await idbPut(STORE_META, { key, value });
}
// ============================================================
//  設定
// ============================================================
async function loadSettings() {
  state.gasUrl = (await getMeta('gasUrl')) || '';
  state.apiKey = (await getMeta('apiKey')) || '';
  document.getElementById('cfg-url').value = state.gasUrl;
  document.getElementById('cfg-key').value = state.apiKey;
}
async function saveSettings() {
  state.gasUrl = document.getElementById('cfg-url').value.trim();
  state.apiKey = document.getElementById('cfg-key').value.trim();
  await setMeta('gasUrl', state.gasUrl);
  await setMeta('apiKey', state.apiKey);
  showToast('設定を保存しました', 'success');
}
// ============================================================
//  GAS API
// ============================================================
async function gasGet(params = {}) {
  if (!state.gasUrl) throw new Error('GAS URLが未設定です');
  const url = new URL(state.gasUrl);
  url.searchParams.set('apiKey', state.apiKey);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}
async function gasPost(body) {
  if (!state.gasUrl) throw new Error('GAS URLが未設定です');
  const res = await fetch(state.gasUrl, {
    method:  'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' }, // GASはContent-Type:application/jsonでCORSエラーになる
    body:    JSON.stringify({ ...body, apiKey: state.apiKey })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}
// ============================================================
//  データ取得・同期
// ============================================================
async function fetchAllData(silent = false) {
  if (!state.gasUrl || !state.apiKey) {
    if (!silent) {
      showToast('⚙️ 設定からURLとAPIキーを入力してください', 'info');
      document.getElementById('settings-panel').classList.add('active');
    }
    return;
  }
  if (!silent) showToast('データを取得中…', 'info');
  try {
    const data = await gasGet();
    if (data.error) throw new Error(data.error);
    await idbClear(STORE_PARTICIPANTS);
    for (const p of data.participants) await idbPut(STORE_PARTICIPANTS, p);
    const syncTime = new Date().toISOString();
    await setMeta('lastSync', syncTime);
    updateLastSyncDisplay(syncTime);
    updateStats(data.stats);
    await buildOfficeFilter();
    if (!silent) showToast(data.participants.length + '件取得しました', 'success');
    // 操作中でなければUIも更新
    if (!isUserActive) await refreshDisplay();
  } catch (e) {
    if (!silent) showToast('取得失敗: ' + e.message, 'error');
  }
}
// ============================================================
//  事業所フィルタ構築
// ============================================================
async function buildOfficeFilter() {
  const all     = await idbGetAll(STORE_PARTICIPANTS);
  const offices = [...new Set(all.map(p => (p.事業所 || '').trim()).filter(Boolean))].sort();
  const sel     = document.getElementById('filter-office');
  const current = sel.value; // 現在の選択値を保持
  sel.innerHTML = '<option value="">全事業所</option>';
  offices.forEach(o => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = o;
    if (o === current) opt.selected = true; // 選択状態を復元
    sel.appendChild(opt);
  });
}
// ============================================================
//  表示リフレッシュ（QR絞り込み中は維持、そうでなければ全件検索）
// ============================================================
async function refreshDisplay() {
  if (currentFamilyId) {
    const all   = await idbGetAll(STORE_PARTICIPANTS);
    const group = all.filter(p => String(p.家族ID || '').trim() === currentFamilyId);
    const fams  = {};
    fams[currentFamilyId] = group;
    renderFamilies(fams, true);
  } else {
    await search();
  }
}
// ============================================================
//  検索（核心ロジック）
// ============================================================
async function search() {
  currentFamilyId = null; // 手動検索時はQR絞り込みを解除
  const name      = document.getElementById('search-name').value.trim();
  const office    = document.getElementById('filter-office').value.trim();
  const childOnly  = document.getElementById('filter-child-only').checked;
  const undoneOnly = document.getElementById('filter-undone-only').checked;
  const noTempOnly = document.getElementById('filter-no-temp').checked;
  let all = await idbGetAll(STORE_PARTICIPANTS);
  if (office)     all = all.filter(p => (p.事業所 || '').trim() === office);
  if (name)       all = all.filter(p => (p.氏名   || '').includes(name));
  if (childOnly)  all = all.filter(p => (p.区分   || '') === '利用児童');
  if (undoneOnly) all = all.filter(p => p.受付 !== '済');
  if (noTempOnly) all = all.filter(p => p.受付 === '済' && p.区分 === '利用児童' && !p.体温);
  // 家族IDでグループ化
  const families = {};
  all.forEach(p => {
    const fid = String(p.家族ID || '不明').trim();
    if (!families[fid]) families[fid] = [];
    families[fid].push(p);
  });
  renderFamilies(families, !!(name || office));
}
// ============================================================
//  QRスキャン後の処理
// ============================================================
async function handleFamilyId(familyId) {
  closeCameraView();
  // ① まずローカルデータで即表示（待ち時間ゼロ）
  const all   = await idbGetAll(STORE_PARTICIPANTS);
  const group = all.filter(p => String(p.家族ID || '').trim() === familyId.trim());
  if (group.length === 0) {
    showToast('該当する家族が見つかりません: ' + familyId, 'error');
    return;
  }
  // ② タイムスタンプが空の人だけ自動受付（済 + タイムスタンプ記録）
  const now        = new Date().toISOString();
  const autoCheckin = group.filter(m => !m.最終更新日時);
  if (autoCheckin.length > 0) {
    for (const member of autoCheckin) {
      member.受付         = '済';
      member.最終更新日時 = now;
      await idbPut(STORE_PARTICIPANTS, member);
    }
    const updates = autoCheckin.map(m => ({ 個人ID: m.個人ID, value: '済', 体温: '', timestamp: now }));
    if (navigator.onLine && state.gasUrl) {
      sendUpdates(updates).catch(() => {
        updates.forEach(u => idbPut(STORE_QUEUE, { ...u, queuedAt: now }));
        updateQueueBadge();
      });
    } else {
      for (const u of updates) await idbPut(STORE_QUEUE, { ...u, queuedAt: now });
      updateQueueBadge();
    }
  }
  // ③ 最新ローカルデータで表示（QR絞り込み状態をセット）
  currentFamilyId = familyId.trim();
  const latest = await idbGetAll(STORE_PARTICIPANTS);
  const newGroup = latest.filter(p => String(p.家族ID || '').trim() === familyId.trim());
  const families = {};
  families[familyId] = newGroup;
  renderFamilies(families, true);
  // QR受付時にバイブレーション
  if (navigator.vibrate) navigator.vibrate(autoCheckin.length > 0 ? [100, 50, 100] : 80);
  const autoMsg = autoCheckin.length > 0 ? `（${autoCheckin.length}名を自動受付）` : '（受付済みのためスキップ）';
  showToast(newGroup[0].氏名 + 'さん一家 ' + newGroup.length + '名を表示 ' + autoMsg, 'success');
  // ④ バックグラウンドでGASから最新データを取得して差分更新
  if (navigator.onLine && state.gasUrl) {
    gasGet({ familyId }).then(async data => {
      if (!data.error && data.participants) {
        let updated = false;
        for (const p of data.participants) {
          const local = latest.find(x => x.個人ID === p.個人ID);
          if (!local || p.最終更新日時 > (local.最終更新日時 || '')) {
            await idbPut(STORE_PARTICIPANTS, p);
            updated = true;
          }
        }
        if (data.stats) updateStats(data.stats);
        if (updated) {
          const refreshed = await idbGetAll(STORE_PARTICIPANTS);
          const fams = {};
          fams[familyId] = refreshed.filter(p => String(p.家族ID || '').trim() === familyId.trim());
          renderFamilies(fams, true);
        }
      }
    }).catch(() => {});
  }
}
// ============================================================
//  レンダリング（シンプルに作り直し）
// ============================================================
function renderFamilies(families, hasSearch) {
  const container = document.getElementById('main-content');
  // ① コンテナを完全クリア
  container.innerHTML = '';
  const keys = Object.keys(families);
  if (keys.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML =
      '<div class="empty-icon">🔭</div>' +
      '<div class="empty-text">' +
        (hasSearch ? '該当する参加者が見つかりません' : 'QRをスキャンするか、氏名・事業所で検索してください') +
      '</div>';
    container.appendChild(empty);
    return;
  }
  keys.forEach(famId => {
    const card = buildFamilyCard(famId, families[famId]);
    container.appendChild(card);
  });
}
// ============================================================
//  家族カード
// ============================================================
function buildFamilyCard(famId, members) {
  const section = document.createElement('div');
  section.className = 'family-section';
  section.dataset.famId = famId;
  const header = document.createElement('div');
  header.className = 'family-header';
  const badge = document.createElement('span');
  badge.className = 'family-id-badge';
  badge.textContent = famId;
  // 電話番号（家族内の最初の電話番号をテキスト表示）
  const tel = (members.find(m => m.電話番号) || {}).電話番号 || '';
  header.appendChild(badge);
  if (tel) {
    const telEl = document.createElement('a');
    telEl.className = 'family-tel';
    telEl.href = 'tel:' + tel;
    telEl.textContent = '📞 ' + tel;
    header.appendChild(telEl);
  }
  const btns = document.createElement('div');
  btns.className = 'family-checkin-all';
  const allBtn = document.createElement('button');
  allBtn.className = 'btn btn-teal btn-sm';
  allBtn.textContent = '全員 受付';
  // [修正1] famIdだけ渡し、最新データはcheckinAll内で取得する
  allBtn.onclick = () => checkinAll(famId, '済');
  const undoBtn = document.createElement('button');
  undoBtn.className = 'btn btn-ghost btn-xs';
  undoBtn.textContent = '全員 取消';
  undoBtn.onclick = () => checkinAll(famId, '未');
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-ghost btn-xs';
  addBtn.textContent = '＋追加';
  addBtn.onclick = () => showAddMemberForm(famId, members[0]);
  btns.appendChild(allBtn);
  btns.appendChild(undoBtn);
  btns.appendChild(addBtn);
  header.appendChild(btns);
  section.appendChild(header);
  members.forEach(p => {
    const row = buildPersonRow(p);
    section.appendChild(row);
  });
  return section;
}
// ============================================================
//  個人行
// ============================================================
function buildPersonRow(person) {
  const row = document.createElement('div');
  row.className = 'person-row';
  row.dataset.pid = person.個人ID;
  const avatar = document.createElement('div');
  avatar.className = 'person-avatar';
  if (person.区分 === '利用児童') {
    avatar.classList.add('avatar-child'); avatar.textContent = '👦';
  } else if (person.区分 === '保護者') {
    avatar.classList.add('avatar-parent'); avatar.textContent = '👤';
  } else {
    avatar.classList.add('avatar-sibling'); avatar.textContent = '🧒';
  }
  const info = document.createElement('div');
  info.className = 'person-info';
  const nameEl = document.createElement('div');
  nameEl.className = 'person-name';
  nameEl.textContent = person.氏名;
  const metaEl = document.createElement('div');
  metaEl.className = 'person-meta';
  metaEl.textContent = (person.年齢 !== '' ? person.年齢 + '歳 ' : '') + person.区分 + ' ／ ' + person.事業所;
  info.appendChild(nameEl);
  info.appendChild(metaEl);
  // 受付時刻の表示
  if (person.受付 === '済' && person.最終更新日時) {
    const timeEl = document.createElement('div');
    timeEl.className = 'checkin-time';
    timeEl.textContent = '受付 ' + formatTime(person.最終更新日時);
    info.appendChild(timeEl);
  }
  const actions = document.createElement('div');
  actions.className = 'person-actions';
  // 体温ドロップダウン（35.0〜38.9を0.1刻み）
  const tempInput = document.createElement('select');
  tempInput.className = 'temp-input';
  const blankOpt = document.createElement('option');
  blankOpt.value = ''; blankOpt.textContent = '体温';
  tempInput.appendChild(blankOpt);
  for (let t = 350; t <= 389; t++) {
    const v = (t / 10).toFixed(1);
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    if (String(person.体温) === v) opt.selected = true;
    tempInput.appendChild(opt);
  }
  const isDone = person.受付 === '済';
  // 受付済み・利用児童・体温未入力 → 赤ハイライト
  if (isDone && person.区分 === '利用児童' && !person.体温) {
    tempInput.classList.add('temp-required');
  }
  // 体温変更時の自動送信（受付済みの場合のみ、1秒デバウンス）
  let tempTimer = null;
  tempInput.addEventListener('focus', () => { isUserActive = true; });
  tempInput.addEventListener('change', () => {
    isUserActive = true;
    if (!isDone) {
      // [修正3] 未受付でも isUserActive を後でリセットする
      setTimeout(() => { isUserActive = false; }, 1500);
      return;
    }
    if (tempInput.value === '') return;
    tempInput.classList.remove('temp-required'); // 入力されたので赤解除
    clearTimeout(tempTimer);
    tempInput.style.borderColor = 'var(--accent)';
    tempTimer = setTimeout(async () => {
      await saveTempOnly(person.個人ID, person.家族ID, tempInput.value);
      tempInput.style.borderColor = 'var(--green)';
      setTimeout(() => { tempInput.style.borderColor = ''; isUserActive = false; }, 1500);
    }, 1000);
  });
  tempInput.addEventListener('blur', () => {
    setTimeout(() => { isUserActive = false; }, 1500);
  });
  const checkinBtn = document.createElement('button');
  checkinBtn.className = 'checkin-btn';
  if (isDone) {
    checkinBtn.classList.add('done');
    checkinBtn.textContent = '✓ 受付済';
    checkinBtn.onclick = () => checkinPerson(person.個人ID, person.家族ID, '未', tempInput.value || '');
  } else {
    checkinBtn.classList.add('undone');
    checkinBtn.textContent = '未';
    checkinBtn.onclick = () => checkinPerson(person.個人ID, person.家族ID, '済', tempInput.value || '');
  }
  actions.appendChild(tempInput);
  actions.appendChild(checkinBtn);
  row.appendChild(avatar);
  row.appendChild(info);
  row.appendChild(actions);
  return row;
}

async function saveTempOnly(個人ID, 家族ID, 体温) {
  const now    = new Date().toISOString();
  const all    = await idbGetAll(STORE_PARTICIPANTS);
  const person = all.find(p => p.個人ID === 個人ID);
  if (!person) return;
  person.体温         = 体温;
  person.最終更新日時 = now;
  await idbPut(STORE_PARTICIPANTS, person);
  const update = { 個人ID, value: person.受付, 体温, timestamp: now };
  if (navigator.onLine && state.gasUrl) {
    await sendUpdates([update]);
  } else {
    await idbPut(STORE_QUEUE, { ...update, queuedAt: now });
    updateQueueBadge();
  }
}

async function checkinPerson(個人ID, 家族ID, value, 体温) {
  const now       = new Date().toISOString();
  const statusKey = '受付';
  const all    = await idbGetAll(STORE_PARTICIPANTS);
  const person = all.find(p => p.個人ID === 個人ID);
  if (!person) return;
  person[statusKey]    = value;
  if (体温 !== '' && 体温 !== undefined) person.体温 = 体温;
  person.最終更新日時 = now;
  await idbPut(STORE_PARTICIPANTS, person);
  // 行を差分更新
  const oldRow = document.querySelector('.person-row[data-pid="' + 個人ID + '"]');
  if (oldRow) oldRow.replaceWith(buildPersonRow(person));
  updateLocalStats();
  // 即座にフィードバック（GAS通信を待たない）
  if (value === '済' && navigator.vibrate) navigator.vibrate(150);
  showToast(
    value === '済' ? person.氏名 + 'を受付しました' : person.氏名 + 'の受付を取り消しました',
    value === '済' ? 'success' : 'info'
  );
  // GAS送信はバックグラウンドで実行（失敗時はキューに保存）
  const sendTemp = value === '未' ? '' : (体温 || '');
  const update = { 個人ID, value, 体温: sendTemp, timestamp: now };
  if (navigator.onLine && state.gasUrl) {
    sendUpdates([update]);
  } else {
    await idbPut(STORE_QUEUE, { ...update, queuedAt: now });
    updateQueueBadge();
  }
}
// [修正1] checkinAll: 古いスナップショットではなくIndexedDBから最新データを取得してから更新
async function checkinAll(famId, value) {
  const now       = new Date().toISOString();
  const statusKey = '受付';
  const updates   = [];
  // IndexedDBから最新のメンバーデータを取得（体温などの変更を反映）
  const all     = await idbGetAll(STORE_PARTICIPANTS);
  const members = all.filter(p => String(p.家族ID || '').trim() === famId);
  for (const member of members) {
    member[statusKey]    = value;
    member.最終更新日時 = now;
    await idbPut(STORE_PARTICIPANTS, member);
    updates.push({ 個人ID: member.個人ID, value, timestamp: now });
  }
  if (updates.length === 0) { showToast('対象者がいません', 'info'); return; }
  // カード全体を再描画
  const card = document.querySelector('.family-section[data-fam-id="' + famId + '"]');
  if (card) {
    const latest = await idbGetAll(STORE_PARTICIPANTS);
    card.replaceWith(buildFamilyCard(famId, latest.filter(p => String(p.家族ID).trim() === famId)));
  }
  updateLocalStats();
  // 即座にフィードバック（GAS通信を待たない）
  if (value === '済' && navigator.vibrate) navigator.vibrate([100, 50, 100]);
  showToast(
    value === '済' ? updates.length + '名を一括受付しました' : updates.length + '名の受付を取り消しました',
    value === '済' ? 'success' : 'info'
  );
  // GAS送信はバックグラウンドで実行
  if (navigator.onLine && state.gasUrl) {
    sendUpdates(updates);
  } else {
    for (const u of updates) await idbPut(STORE_QUEUE, { ...u, queuedAt: now });
    updateQueueBadge();
  }
}
// ============================================================
//  GAS送信 / キュー
// ============================================================
async function sendUpdates(updates) {
  try {
    const result = await gasPost({ action: 'checkin', updates });
    if (result.error) throw new Error(result.error);
    if (result.results) {
      for (const r of result.results) {
        if (r.status === 'ok') {
          const all = await idbGetAll(STORE_PARTICIPANTS);
          const p   = all.find(x => x.個人ID === r.個人ID);
          if (p) { p.最終更新日時 = r.updatedAt; await idbPut(STORE_PARTICIPANTS, p); }
        }
      }
    }
  } catch (e) {
    const now = new Date().toISOString();
    for (const u of updates) await idbPut(STORE_QUEUE, { ...u, queuedAt: now });
    updateQueueBadge();
    showToast('オフライン: キューに保存しました', 'info');
  }
}
async function flushQueue() {
  if (isSyncing || !navigator.onLine || !state.gasUrl) return;
  const queue = await idbGetAll(STORE_QUEUE);
  if (queue.length === 0) return;
  isSyncing = true;
  try {
    const updates = queue.map(({ queueId, queuedAt, ...rest }) => rest);
    const result  = await gasPost({ action: 'checkin', updates });
    if (!result.error && result.results) {
      for (let i = 0; i < queue.length; i++) {
        const r = result.results[i];
        if (r && ['ok','skipped_conflict','not_target'].includes(r.status))
          await idbDelete(STORE_QUEUE, queue[i].queueId);
      }
      updateQueueBadge();
      showToast(queue.length + '件を同期しました', 'success');
      await refreshDisplay();
    }
  } catch (e) { /* 次回リトライ */ }
  finally { isSyncing = false; }
}
async function updateQueueBadge() {
  const queue = await idbGetAll(STORE_QUEUE);
  const badge = document.getElementById('queue-badge');
  document.getElementById('queue-count').textContent = queue.length;
  badge.classList.toggle('visible', queue.length > 0);
}

// ============================================================
//  QRカメラ（Androidフォールバック付き）
// ============================================================
async function openCameraView() {
  const view = document.getElementById('camera-view');
  view.classList.add('active');
  if (!location.protocol.startsWith('https') && location.hostname !== 'localhost') {
    showToast('カメラはHTTPS環境が必要です', 'error');
    closeCameraView();
    return;
  }
  // BarcodeDetector API対応チェック
  const hasBarcodeDetector = 'BarcodeDetector' in window;
  // カメラ起動
  const constraints = [
    { video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } } },
    { video: { facingMode: { ideal: 'environment' } } },
    { video: true }
  ];
  let started = false;
  let lastErr = '';
  for (const c of constraints) {
    try {
      qrStream = await navigator.mediaDevices.getUserMedia(c);
      started = true;
      break;
    } catch (e) { lastErr = e.message; }
  }
  if (!started) {
    view.classList.remove('active');
    const isIOS     = /iPhone|iPad/.test(navigator.userAgent);
    const isAndroid = /Android/.test(navigator.userAgent);
    let guide = '';
    if (isIOS) {
      guide = `【iPhone/iPad】
iOS設定 → Safari → カメラ → 許可`;
    } else if (isAndroid) {
      guide = `【Android Chrome】
アドレスバー右の 🔒 → カメラ → 許可`;
    } else {
      guide = `【PC Chrome】
アドレスバー右の 🔒 → カメラを許可`;
    }
    alert('カメラへのアクセスが拒否されています。\n\n' + guide);
    return;
  }
  const video = document.getElementById('qr-video');
  video.srcObject = qrStream;
  video.setAttribute('playsinline', 'true');
  video.setAttribute('muted', 'true');
  let scanning = true;
  qrInterval = { stop: () => { scanning = false; } };
  if (hasBarcodeDetector) {
    // ---- BarcodeDetector API（Android Chrome推奨） ----
    let detector;
    try {
      detector = new BarcodeDetector({ formats: ['qr_code'] });
    } catch(e) {
      showToast('BarcodeDetector初期化失敗: ' + e.message, 'error');
      closeCameraView(); return;
    }
    let lastResult = '';
    let cooldown   = false;
    let lastScan   = 0;
    async function scanFrame(timestamp) {
      if (!scanning) return;
      requestAnimationFrame(scanFrame);
      if (timestamp - lastScan < 200) return;
      lastScan = timestamp;
      if (video.readyState < 2 || video.videoWidth === 0) return;
      if (cooldown) return;
      try {
        const codes = await detector.detect(video);
        if (codes.length > 0) {
          const val = codes[0].rawValue;
          if (val && val !== lastResult) {
            lastResult = val;
            cooldown   = true;
            setTimeout(() => { cooldown = false; lastResult = ''; }, 2000);
            handleFamilyId(val.trim());
          }
        }
      } catch(e) { /* フレームスキップ */ }
    }
    video.addEventListener('loadeddata', () => requestAnimationFrame(scanFrame), { once: true });
    video.play().catch(() => {});
    showToast('📷 QRコードをカメラに向けてください', 'info');
  } else {
    // ---- jsQRフォールバック（BarcodeDetector非対応環境用） ----
    // オフライン時はjsQRが使えないため案内して終了
    if (!navigator.onLine) {
      showToast('オフライン時はQR読取にBarcodeDetector非対応のブラウザは使えません。Androidをご使用ください。', 'error');
      closeCameraView(); return;
    }
    // jsQRのロード完了を最大3秒待つ
    let waited = 0;
    while (typeof jsQR === 'undefined' && waited < 3000) {
      await new Promise(r => setTimeout(r, 200));
      waited += 200;
    }
    if (typeof jsQR === 'undefined') {
      showToast('QR読取ライブラリのロードに失敗しました。ページを再読み込みしてください。', 'error');
      closeCameraView(); return;
    }
    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d', { willReadFrequently: true });
    let lastResult = '';
    let cooldown   = false;
    let lastScan   = 0;
    function scanFrame(timestamp) {
      if (!scanning) return;
      requestAnimationFrame(scanFrame);
      if (timestamp - lastScan < 150) return;
      lastScan = timestamp;
      if (video.readyState < 2 || video.videoWidth === 0) return;
      if (cooldown) return;
      const scale   = Math.min(1, 640 / Math.max(video.videoWidth, video.videoHeight));
      canvas.width  = Math.floor(video.videoWidth  * scale);
      canvas.height = Math.floor(video.videoHeight * scale);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });
      if (code && code.data && code.data !== lastResult) {
        lastResult = code.data;
        cooldown   = true;
        setTimeout(() => { cooldown = false; lastResult = ''; }, 2000);
        handleFamilyId(code.data.trim());
      }
    }
    video.addEventListener('loadeddata', () => requestAnimationFrame(scanFrame), { once: true });
    video.play().catch(() => {});
    showToast('📷 QRコードをカメラに向けてください (jsQR)', 'info');
  }
}
function closeCameraView() {
  if (qrInterval) {
    if (typeof qrInterval.stop === 'function') qrInterval.stop();
    else clearInterval(qrInterval);
    qrInterval = null;
  }
  if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
  document.getElementById('camera-view').classList.remove('active');
}

  });
  // QRカメラ
  document.getElementById('open-camera').addEventListener('click', openCameraView);
  document.getElementById('close-camera').addEventListener('click', closeCameraView);
  // 新規追加
  document.getElementById('add-btn').addEventListener('click', showAddForm);
  // 設定パネル
  document.getElementById('open-settings').addEventListener('click', () => {
    document.getElementById('settings-panel').classList.add('active');
  });
  document.getElementById('close-settings').addEventListener('click', () => {
    document.getElementById('settings-panel').classList.remove('active');
  });
  document.getElementById('save-settings').addEventListener('click', async () => {
    await saveSettings();
    document.getElementById('settings-panel').classList.remove('active');
    await fetchAllData();
  });
  document.getElementById('refresh-data').addEventListener('click', async () => {
    await fetchAllData();
    document.getElementById('settings-panel').classList.remove('active');
  });
  document.getElementById('clear-data').addEventListener('click', () => {
    showConfirm(
      'データを全消去しますか？',
      'ローカルに保存された全参加者データと送信キューが削除されます。この操作は取り消せません。',
      clearAllData
    );
  });
  // モーダル
  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('confirm-modal').classList.remove('active');
  });
  // オンライン/オフライン
  window.addEventListener('online',  updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  // 設定パネル背景タップで閉じる
  document.getElementById('settings-panel').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
  });
}
// ============================================================
//  テーマ切り替え
// ============================================================
function setTheme(theme) {
  if (theme === 'light') {
    document.body.classList.add('theme-light');
  } else {
    document.body.classList.remove('theme-light');
  }
  // ボタンのactive状態を更新
  document.getElementById('theme-dark') .classList.toggle('btn-primary', theme === 'dark');
  document.getElementById('theme-light').classList.toggle('btn-primary', theme === 'light');
  document.getElementById('theme-dark') .classList.toggle('btn-ghost',   theme !== 'dark');
  document.getElementById('theme-light').classList.toggle('btn-ghost',   theme !== 'light');
  // IndexedDBに保存
  setMeta('theme', theme);
}
// ============================================================
//  初期化
// ============================================================
// ============================================================
//  自動ポーリング（30秒ごと・操作中スキップ）
// ============================================================
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    if (!navigator.onLine || !state.gasUrl || !state.apiKey) return;
    if (isUserActive) return;
    await fetchAllData(true);
  }, 30000);
}
async function init() {
  db = await openDB();
  await loadSettings();
  // テーマ復元
  const savedTheme = await getMeta('theme') || 'dark';
  setTheme(savedTheme);
  await buildOfficeFilter();
  await updateLocalStats();
  await updateQueueBadge();
  updateOnlineStatus();
  // 最終同期時刻を復元表示
  const lastSync = await getMeta('lastSync');
  if (lastSync) updateLastSyncDisplay(lastSync);
  bindEvents();
  const all = await idbGetAll(STORE_PARTICIPANTS);
  if (all.length === 0 && state.gasUrl && state.apiKey) {
    await fetchAllData();
  } else if (all.length === 0) {
    showToast('⚙️ 設定からURLとAPIキーを登録してください', 'info');
    document.getElementById('settings-panel').classList.add('active');
  } else {
    // 起動時にすでにデータがあれば全員表示
    await search();
  }
  startPolling();
}
init().catch(e => {
  console.error('Init failed:', e);
  showToast('起動エラー: ' + e.message, 'error');
});
